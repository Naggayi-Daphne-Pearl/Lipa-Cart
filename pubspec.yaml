name: lipa_cart
description: "LIPACART - Fresh groceries delivered to your doorstep"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.2

  # UI Components
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^2.0.1

  # Forms & Validation
  pin_code_fields: ^8.0.1

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # HTTP
  http: ^1.6.0

  # Image Upload
  image_picker: ^1.0.4
  permission_handler: ^12.0.1

  # Firebase & Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # Utilities
  intl: ^0.20.0
  uuid: ^4.5.1

  # Icons
  iconsax: ^0.0.8
  url_launcher: ^6.3.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  sentry_flutter: ^9.15.0
  connectivity_plus: ^6.1.4
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logos/
    - assets/icons/

  # Fonts (uncomment and add font files to enable custom fonts)
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/logos/app_icon.png"
    background_color: "#F89227"
    theme_color: "#F89227"
  image_path: "assets/images/logos/app_icon.png"
  min_sdk_android: 21

  # Adaptive icons for Android
  adaptive_icon_background: "#F89227"
  adaptive_icon_foreground: "assets/images/logos/app_icon.png"

  # iOS specific
  remove_alpha_ios: true
