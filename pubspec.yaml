name: lipa_cart
description: "LIPACART - Fresh groceries delivered to your doorstep"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.2

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.2.0+3

  # Forms & Validation
  pin_code_fields: ^8.0.1

  # Storage
  shared_preferences: ^2.3.3

  # Utilities
  intl: ^0.20.0
  uuid: ^4.5.1

  # Icons
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts (uncomment and add font files to enable custom fonts)
  # fonts:
