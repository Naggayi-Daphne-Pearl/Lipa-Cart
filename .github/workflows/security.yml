name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly scan every Monday 06:00 UTC to catch newly-disclosed issues in unchanged code.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  # gitleaks-action needs pull_requests: read to list commits on PR events;
  # without it the action returns 403 "Resource not accessible by integration".
  pull-requests: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      # Pinned to a specific Semgrep release for supply-chain safety.
      # Dependabot tracks container updates via the `semgrep/semgrep` image.
      image: semgrep/semgrep:1.157.0@sha256:17d89ddd91a7729bbd5de09402f7f79a70204289e2a94635086e9db532a495f2
    steps:
      - name: Checkout
        # actions/checkout v4 — SHA-pinned; Dependabot will update.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Phase 1: `continue-on-error` lets findings surface as a visible red step
      # without blocking the PR while the baseline is cleaned up. Unlike `|| true`,
      # this preserves the real exit code so internal Semgrep errors (exit 2) and
      # auth failures (exit 13) are still clearly visible in the step status.
      # Findings print directly to the workflow log with file:line annotations.
      # Flip to `false` once the baseline is clean — see CONTRIBUTING.md.
      #
      # Ruleset notes: Semgrep does not ship a dedicated Dart/Flutter ruleset, so
      # we rely on OWASP Top Ten (language-agnostic) and secrets. This still
      # catches hardcoded credentials, insecure HTTP, weak crypto, and common
      # injection patterns in Dart source. (p/mobile was retired from the
      # Semgrep registry.)
      - name: Run Semgrep
        continue-on-error: true
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/secrets

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        # actions/checkout v4 — SHA-pinned.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # gitleaks/gitleaks-action v2 — SHA-pinned.
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # `flutter pub outdated --mode=null-safety` and `pub` advisory scanning are not
  # in CI yet. Dependabot (see .github/dependabot.yml) tracks pub + github-actions
  # updates weekly. A blocking `pub` advisory job will be added once Dart's
  # advisory database integration is stable and the baseline is clean.
